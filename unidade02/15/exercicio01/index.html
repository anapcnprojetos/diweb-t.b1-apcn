<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Aula 15 - Exercício 01</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: gray;
            font-family: monospace, sans-serif;
        }
        h1 {
            margin-bottom: 20px;
            text-align: center;
        }
        form {
            background-color: white;
            margin: 100px auto;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
        }
        input{
            margin: 5px 0px;
            padding: 5px;
            width: 300px;
            border: 1px solid coral;
        }
        .button {
            padding: 10px 10px;
            background-color: coral;
            color: white;
            font-weight: 600;
            border: none;
        }
    </style>
</head>
<body>
    <form method="post">
        <h1>Login</h1>
        <br>
        <input type="text" name="email" id="email" required placeholder="Informe seu e-mail." autofocus>
        <br>
        <label for="password">Password</label>
        <br>
        <input type="password" name="password" id="password" required placeholder="Informe seu password.">
        <br>
        <input type="submit" name="Enviar" class="button">
        <input type="reset" name="Limpar" class="button">
    </form>
</body>
</html>
