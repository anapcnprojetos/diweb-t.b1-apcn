<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 11 - Exercício 01</title>
    <style>
        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 22px;
        }

        h1 {
            text-align: center;
            font-family: cursive;
            font-size: 66px;
        }

        .pizza {
            width: 150px;
            border-radius: 50%;
            border: 5px solid darkorange;
            margin-left: 50px;
        }

        .simples {
            border: 2px solid black;
            margin: 50px;
            background-color: mediumslateblue;
            color: white;
        }

        .personalizada {
            border-top: 3px dotted green;
            border-right: 4px double red;
            border-bottom: 1px solid blueviolet;
            border-left: 16px solid orange;
            margin: 50px;
            background-color: gray;
            color: white;
        }
    </style>
</head>

<body>
    <img src="img/pizza.jpg" alt="Imagem de uma pizza." class="pizza">

    <h1>
        Bem vindo a pizzaria ETC
    </h1>

    <div class="simples">
        Está caixa tem uma borda simples.
    </div>
    <div class="personalizada">
        Está caixa tem bordas personalizadas para cada lado.
    </div>
</body>

</html>
